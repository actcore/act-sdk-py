[project]
name = "act-sdk"
version = "0.1.0"
description = "Python SDK for ACT components"
requires-python = ">=3.12"
dependencies = [
    "cbor2>=5.8.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.15"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/act_sdk"]
